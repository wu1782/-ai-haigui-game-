# ============================================
# AI 海龟汤游戏 - GitHub Actions CI/CD (增强版)
# ============================================

name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'
  DOCKER_BUILDKIT: 1

jobs:
  # ------------------------------------------
  # Lint and Type Check
  # ------------------------------------------
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Cache node_modules
        uses: actions/cache@v3
        with:
          path: |
            node_modules
            server/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies (Frontend)
        run: npm ci

      - name: Install dependencies (Backend)
        run: cd server && npm ci

      - name: Run ESLint (Frontend)
        run: npm run lint || true

      - name: TypeScript Type Check (Frontend)
        run: npx tsc --noEmit

      - name: TypeScript Type Check (Backend)
        run: cd server && npx tsc --noEmit || true

  # ------------------------------------------
  # Unit Tests
  # ------------------------------------------
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install backend dependencies
        run: cd server && npm ci

      - name: Run Frontend Tests
        run: npm test -- --coverage --passWithNoTests || true

      - name: Run Backend Tests
        run: cd server && npm test || true

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        if: always()
        with:
          files: ./coverage/lcov.info,./server/coverage/lcov.info
          fail_ci_if_error: false

  # ------------------------------------------
  # E2E Tests (Playwright)
  # ------------------------------------------
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Build
        run: npm run build

      - name: Run E2E Tests
        run: npx playwright test || true
        env:
          CI: true

  # ------------------------------------------
  # Build Verification
  # ------------------------------------------
  build:
    name: Build Verification
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install backend dependencies
        run: cd server && npm ci

      - name: Build Frontend
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

      - name: Build Backend Docker Image
        run: |
          cd server
          docker build -t ai-turtle-soup-backend:${{ github.sha }} .

      - name: Verify Build Output
        run: |
          test -d dist || (echo "Build failed - dist directory not found" && exit 1)
          test -f server/package.json || (echo "Build failed - server package.json not found" && exit 1)

  # ------------------------------------------
  # Deploy to Staging (on PR merge)
  # ------------------------------------------
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build, test]
    if: github.event_name == 'push' && github.event.pull_request.merged == true

    environment:
      name: staging
      url: https://staging.ai-turtle-soup.vercel.app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy Backend to Railway (Staging)
        uses: railway-deploy-action@v2
        with:
          railway_token: ${{ secrets.RAILWAY_TOKEN_STAGING }}
          service: backend-staging
          environment: staging

      - name: Deploy Frontend to Vercel (Staging)
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID_STAGING }}
          vercel-args: '--prod=false'
          working-directory: ./

  # ------------------------------------------
  # Deploy to Production (on main branch)
  # ------------------------------------------
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && github.event.pull_request.merged != true

    environment:
      name: production
      url: https://ai-turtle-soup.vercel.app

    concurrency:
      group: production
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy Backend to Railway (Production)
        uses: railway-deploy-action@v2
        with:
          railway_token: ${{ secrets.RAILWAY_TOKEN_PRODUCTION }}
          service: backend-production
          environment: production

      - name: Deploy Frontend to Vercel (Production)
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID_PRODUCTION }}
          vercel-args: '--prod'
          working-directory: ./
