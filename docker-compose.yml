# ============================================
# AI 海龟汤游戏 - Docker Compose 配置
# ============================================

services:
  # ------------------------------------------
  # 后端服务 (Node.js/Express)
  # ------------------------------------------
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: ai-turtle-soup-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:-${JWT_SECRET}-refresh}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:5173,http://localhost:3000}
      - REDIS_URL=redis://redis:6379
      - MONGODB_URI=mongodb://mongodb:27017/ai-turtle-soup
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_SECURE=${SMTP_SECURE:-false}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-}
      - APP_URL=${APP_URL:-}
    depends_on:
      redis:
        condition: service_healthy
      mongodb:
        condition: service_started
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/api/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - app-network

  # ------------------------------------------
  # 前端服务 (Nginx)
  # ------------------------------------------
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: ai-turtle-soup-frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - NODE_ENV=production
    depends_on:
      - backend
    networks:
      - app-network

  # ------------------------------------------
  # Redis 服务
  # ------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: ai-turtle-soup-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - app-network

  # ------------------------------------------
  # MongoDB 服务 (可选，用于生产环境)
  # ------------------------------------------
  mongodb:
    image: mongo:7
    container_name: ai-turtle-soup-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USER:-admin}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASSWORD:-password}
    networks:
      - app-network

# ------------------------------------------
# 网络配置
# ------------------------------------------
networks:
  app-network:
    driver: bridge

# ------------------------------------------
# 卷配置
# ------------------------------------------
volumes:
  redis_data:
  mongodb_data:
